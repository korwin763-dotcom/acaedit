<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>아카라이브 VN 레이아웃 에디터</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:#191919; color:#ccc; overflow:hidden; height:100vh; }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#444; border-radius:3px; }
  input[type=range] { accent-color:#e8e0d4; }
  textarea:focus, select:focus, input:focus { outline:none; border-color:#555 !important; }
  button { font-family:inherit; }

  .app { display:flex; height:100vh; overflow:hidden; }

  .editor { width:380px; min-width:320px; background:#222; border-right:1px solid #333; display:flex; flex-direction:column; }
  .tabs { display:flex; border-bottom:1px solid #333; }
  .tab { flex:1; padding:13px 0; background:transparent; color:#666; border:none; border-bottom:2px solid transparent; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; }
  .tab.active { background:#2a2a2a; color:#e8e0d4; border-bottom-color:#e8e0d4; }
  .tab-content { flex:1; overflow-y:auto; padding:14px; }
  .bottom-bar { padding:10px 14px 14px; border-top:1px solid #333; }

  .block-card { background:#2c2c2c; border-radius:10px; padding:14px; border:1px solid #3a3a3a; margin-bottom:10px; }
  .block-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .block-type { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; }
  .block-type.text { color:#8bc7ff; }
  .block-type.image { color:#ffb86b; }
  .block-actions { display:flex; gap:2px; }
  .icon-btn { background:none; border:none; color:#888; cursor:pointer; font-size:13px; padding:2px 6px; border-radius:4px; line-height:1; }
  .icon-btn:hover { color:#ccc; background:#333; }
  .icon-btn.danger:hover { color:#ff4444; background:#3a2020; }

  .block-textarea {
    width:100%; background:#1e1e1e; color:#ddd;
    border:1px solid #3a3a3a; border-radius:8px;
    padding:10px 12px; font-size:14px; font-family:inherit;
    resize:vertical; line-height:1.7;
  }
  .upload-zone {
    width:100%; min-height:72px; background:#1e1e1e;
    border:2px dashed #444; border-radius:10px;
    color:#666; cursor:pointer; font-size:13px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    padding:14px; transition:all .2s;
  }
  .upload-zone:hover { border-color:#888; color:#999; background:#252525; }
  .upload-zone .hint { font-size:11px; color:#555; margin-top:2px; }
  .img-url-input {
    width:100%; margin-top:8px; background:#1e1e1e; color:#aaa;
    border:1px solid #3a3a3a; border-radius:6px;
    padding:6px 10px; font-size:12px;
  }
  .img-preview { position:relative; }
  .img-preview img { width:100%; max-height:160px; object-fit:cover; border-radius:8px; display:block; }
  .img-overlay {
    position:absolute; inset:0; display:flex; gap:6px;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,.5); border-radius:8px;
    opacity:0; transition:opacity .2s;
  }
  .img-preview:hover .img-overlay { opacity:1; }
  .img-overlay button {
    background:rgba(0,0,0,.7); color:#ccc; border:none;
    border-radius:6px; padding:5px 12px; font-size:12px; cursor:pointer;
  }

  .style-group { margin-bottom:14px; }
  .style-label { font-size:11px; color:#888; margin-bottom:6px; font-weight:600; display:block; }
  .color-row { display:flex; align-items:center; gap:6px; }
  .color-input { width:28px; height:28px; border:none; background:none; cursor:pointer; padding:0; }
  .color-presets { display:flex; gap:4px; flex:1; flex-wrap:wrap; }
  .color-preset {
    width:22px; height:22px; border-radius:6px; border:1px solid #555;
    cursor:pointer; padding:0; transition:all .15s;
  }
  .color-preset.active { border:2px solid #e8e0d4; }
  .slider-row { display:flex; align-items:center; gap:8px; }
  .slider-row input[type=range] { flex:1; }
  .slider-val { font-size:12px; color:#888; min-width:40px; text-align:right; }
  .style-select {
    width:100%; background:#333; color:#ccc;
    border:1px solid #444; border-radius:6px;
    padding:7px 10px; font-size:13px; font-family:inherit;
  }
  .align-btns { display:flex; gap:4px; }
  .align-btn {
    flex:1; padding:6px 0; border-radius:6px; font-size:12px;
    cursor:pointer; border:1px solid #444; background:#333; color:#999; transition:all .15s;
  }
  .align-btn.active { background:#e8e0d4; color:#1a1a1a; border-color:#e8e0d4; }
  .toggle-row { display:flex; align-items:center; justify-content:space-between; }
  .toggle {
    width:40px; height:22px; border-radius:11px; border:none;
    cursor:pointer; position:relative; transition:background .2s; padding:0;
  }
  .toggle.on { background:#e8e0d4; }
  .toggle.off { background:#444; }
  .toggle::after {
    content:''; position:absolute; top:3px;
    width:16px; height:16px; border-radius:50%;
    background:#fff; transition:left .2s; box-shadow:0 1px 3px rgba(0,0,0,.3);
  }
  .toggle.on::after { left:21px; }
  .toggle.off::after { left:3px; }

  .section-divider { border:none; border-top:1px solid #3a3a3a; margin:18px 0 14px; }
  .section-title { font-size:12px; color:#e8e0d4; font-weight:700; margin-bottom:12px; letter-spacing:.05em; }

  .demo-box {
    background:#1e1e1e; border-radius:8px; padding:12px; margin-top:8px;
    font-size:13px; line-height:1.7;
  }

  .btn-row { display:flex; gap:6px; margin-bottom:6px; }
  .btn-row:last-child { margin-bottom:0; }
  .add-btn {
    flex:1; padding:9px 0; background:#333; color:#ccc;
    border:1px solid #444; border-radius:8px;
    cursor:pointer; font-size:13px; font-weight:600;
  }
  .add-btn:hover { background:#3a3a3a; }
  .primary-btn {
    flex:1; padding:10px 0; border:none; border-radius:8px;
    cursor:pointer; font-size:13px; font-weight:700;
    letter-spacing:0.03em; transition:all .2s;
  }
  .copy-rich { background:#e8e0d4; color:#1a1a1a; }
  .copy-rich.ok { background:#4caf50; color:#fff; }
  .copy-html { background:#444; color:#ccc; }
  .copy-html.ok { background:#4caf50; color:#fff; }

  /* Preview Area */
  .preview-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .preview-toolbar {
    display:flex; align-items:center; justify-content:center;
    gap:4px; padding:10px 16px;
    background:#1f1f1f; border-bottom:1px solid #2a2a2a;
    flex-shrink:0;
  }
  .preview-mode-btn {
    padding:6px 14px; border-radius:6px; font-size:12px; font-weight:600;
    cursor:pointer; border:1px solid #3a3a3a; background:#2a2a2a; color:#888;
    transition:all .15s; font-family:inherit;
  }
  .preview-mode-btn.active { background:#e8e0d4; color:#1a1a1a; border-color:#e8e0d4; }
  .preview-mode-btn .mode-icon { margin-right:4px; }
  .preview-size-label {
    font-size:11px; color:#555; margin-left:12px;
  }

  .preview-scroll { flex:1; overflow-y:auto; background:#191919; }

  /* Desktop preview */
  .preview-frame-desktop { padding:20px; max-width:640px; margin:0 auto; }
  .preview-frame-desktop .preview-box { border-radius:8px; overflow:hidden; box-shadow:0 2px 20px rgba(0,0,0,.4); }

  /* Mobile preview — phone mockup */
  .preview-frame-mobile {
    display:flex; justify-content:center; align-items:flex-start;
    padding:24px 20px;
  }
  .phone-mockup {
    width:375px; max-width:100%;
    background:#111; border-radius:32px;
    border:3px solid #444;
    box-shadow: 0 8px 40px rgba(0,0,0,.6), inset 0 0 0 1px #333;
    overflow:hidden; display:flex; flex-direction:column;
  }
  .phone-notch {
    height:32px; background:#111;
    display:flex; align-items:center; justify-content:center;
    position:relative; flex-shrink:0;
  }
  .phone-notch::after {
    content:''; width:80px; height:6px; background:#222;
    border-radius:3px;
  }
  .phone-screen {
    flex:1; overflow-y:auto; max-height:calc(100vh - 200px);
  }
  .phone-home-bar {
    height:20px; background:#111;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .phone-home-bar::after {
    content:''; width:100px; height:4px; background:#333;
    border-radius:2px;
  }

  .img-placeholder {
    display:flex; justify-content:center; align-items:center;
    height:120px; margin:0 auto 24px; background:rgba(255,255,255,.03);
    border-radius:16px; width:60%; font-size:40px; opacity:.2;
  }

  .code-panel {
    height:220px; background:#1a1a1a; border-top:1px solid #333;
    display:flex; flex-direction:column;
  }
  .code-header {
    padding:8px 16px; font-size:11px; color:#888;
    border-bottom:1px solid #2a2a2a;
    display:flex; justify-content:space-between; align-items:center;
  }
  .code-area {
    flex:1; background:#111; color:#999; border:none;
    padding:16px; font-size:12px; font-family:'SF Mono','Fira Code','Consolas',monospace;
    resize:none; line-height:1.5;
  }

  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:#333; color:#e8e0d4; padding:10px 24px; border-radius:10px;
    font-size:13px; font-weight:600; z-index:999;
    box-shadow:0 4px 20px rgba(0,0,0,.5);
    animation: toastIn .3s ease;
  }
  @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
</style>
</head>
<body>

<div class="app">
  <div class="editor">
    <div class="tabs">
      <button class="tab active" id="tab-blocks" onclick="switchTab('blocks')">블록</button>
      <button class="tab" id="tab-style" onclick="switchTab('style')">스타일</button>
    </div>
    <div class="tab-content" id="tab-content"></div>
    <div class="bottom-bar" id="bottom-bar"></div>
  </div>

  <div class="preview-area">
    <div class="preview-toolbar" id="preview-toolbar"></div>
    <div class="preview-scroll" id="preview-scroll"></div>
    <div class="code-panel" id="code-panel" style="display:none">
      <div class="code-header">
        <span>아카라이브 HTML 코드</span>
        <span style="color:#666">글쓰기 → HTML 모드 → 붙여넣기</span>
      </div>
      <textarea class="code-area" id="code-area" readonly onclick="this.select()"></textarea>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
let blocks = [
  { id:uid(), type:'text', content:'그녀는 자리에 앉아 두 손을 무릎 위에 포갰다. 아무것도 끼워져 있지 않은 네 번째 손가락을 그 아래로 숨긴 채.' },
  { id:uid(), type:'image', src:'', url:'' },
  { id:uid(), type:'text', content:'"사춘기잖아. 툭하면 방문 걸어 잠그고 가시 세우는데, 저렇게라도 가끔 뇌물 안 먹이면 아빠 얼굴 쳐다보지도 않을걸."\n\n빨간 불빛이 그녀를 빤히 응시했다.\n\n"우리 집 평화를 위한 방패막이 유지비라고 생각해."' },
];

let settings = {
  bgColor:'#2b2b2b', textColor:'#e8e0d4',
  fontSize:18, fontFamily:"'NanumBarunGothic', sans-serif",
  lineHeight:1.85, imageRadius:14, imageWidth:65,
  textAlign:'left', padding:48,
  dialogueEnabled: true,
  dialogueColor: '#c9b99a',
  dialogueBold: false,
  dialogueItalic: false,
  dialogueQuoteStyle: 'all',
  narrationColor: '#e8e0d4',
  imageCrop: false,
  imageCropHeight: 300,
  markerEnabled: false,
  markerStyle: 'long-line',
};

let currentTab = 'blocks', showCode = false;
let previewMode = 'desktop';

// 아카라이브 지원 폰트 목록
const ARCA_FONTS = [
  {l:"나눔바른고딕", v:"'NanumBarunGothic', sans-serif"},
  {l:"나눔고딕", v:"'NanumGothic', sans-serif"},
  {l:"Noto Sans KR", v:"'Noto Sans KR', sans-serif"},
  {l:"Apple SD 고딕 Neo", v:"'Apple SD Gothic Neo', sans-serif"},
  {l:"Pretendard", v:"'Pretendard', sans-serif"},
];

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function saveState() {
  try {
    const data = { blocks: blocks.map(b => {
      if (b.type==='image') return {...b, src: b.src && b.src.length<500000 ? b.src : ''};
      return b;
    }), settings, previewMode };
    localStorage.setItem('arca-vn-v5', JSON.stringify(data));
  } catch(e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem('arca-vn-v5');
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.blocks) blocks = d.blocks;
    if (d.settings) settings = {...settings, ...d.settings};
    if (d.previewMode) previewMode = d.previewMode;
  } catch(e) {}
}
loadState();

// ── Quote detection ──
function getQuoteRegex() {
  const s = settings.dialogueQuoteStyle;
  const patterns = {
    double: '[""\u201C\u201D]([^""\u201C\u201D]*?)[""\u201C\u201D]',
    single: "[''\\u2018\\u2019]([^''\\u2018\\u2019]*?)[''\\u2018\\u2019]",
    guillemet: '[«\u300A]([^»\u300B]*?)[»\u300B]',
  };
  if (s === 'double') return new RegExp(patterns.double, 'g');
  if (s === 'single') return new RegExp(patterns.single, 'g');
  if (s === 'guillemet') return new RegExp(patterns.guillemet, 'g');
  return new RegExp(`${patterns.double}|${patterns.single}|${patterns.guillemet}`, 'g');
}

function styleLine(line) {
  if (!settings.dialogueEnabled) return esc(line);
  const s = settings;
  const rawRegex = getQuoteRegex();
  const parts = [];
  let rLast = 0, rMatch;

  while ((rMatch = rawRegex.exec(line)) !== null) {
    if (rMatch.index > rLast) parts.push({ type:'narr', text: line.slice(rLast, rMatch.index) });
    parts.push({ type:'dial', text: rMatch[0] });
    rLast = rMatch.index + rMatch[0].length;
  }
  if (rLast < line.length) parts.push({ type:'narr', text: line.slice(rLast) });
  if (!parts.length) parts.push({ type:'narr', text: line });

  return parts.map(p => {
    const t = esc(p.text);
    if (p.type === 'dial') {
      let st = `color:${s.dialogueColor}`;
      if (s.dialogueBold) st += `;font-weight:700`;
      if (s.dialogueItalic) st += `;font-style:italic`;
      return `<span style="${st}">${t}</span>`;
    } else {
      if (s.narrationColor !== s.textColor) return `<span style="color:${s.narrationColor}">${t}</span>`;
      return t;
    }
  }).join('');
}

// ── Clipboard Paste ──
document.addEventListener('paste', (e) => {
  const tag = document.activeElement?.tagName;
  if (tag === 'TEXTAREA' || tag === 'INPUT') return;
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      if (!file) return;
      readImageFile(file, (d) => {
        let idx = blocks.findIndex(b => b.type==='image' && !b.src && !b.url);
        if (idx===-1) { blocks.push({id:uid(),type:'image',src:'',url:''}); idx=blocks.length-1; }
        blocks[idx].src = d;
        render(); toast('이미지가 붙여넣기 되었어요!');
      });
      return;
    }
  }
});

function toast(msg) {
  const el = document.getElementById('toast-container');
  el.innerHTML = `<div class="toast">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 2500);
}

// ── Render ──
function render() {
  renderEditor();
  renderPreviewToolbar();
  renderPreview();
  renderBottom();
  if (showCode) {
    document.getElementById('code-panel').style.display = 'flex';
    document.getElementById('code-area').value = generateHTML();
  } else {
    document.getElementById('code-panel').style.display = 'none';
  }
  saveState();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-blocks').className = tab==='blocks' ? 'tab active' : 'tab';
  document.getElementById('tab-style').className = tab==='style' ? 'tab active' : 'tab';
  render();
}

function setPreviewMode(mode) {
  previewMode = mode;
  render();
}

function renderPreviewToolbar() {
  const el = document.getElementById('preview-toolbar');
  const modes = [
    { id:'desktop', icon:'🖥', label:'데스크탑' },
    { id:'mobile', icon:'📱', label:'모바일' },
  ];
  el.innerHTML = modes.map(m =>
    `<button class="preview-mode-btn ${previewMode===m.id?'active':''}"
      onclick="setPreviewMode('${m.id}')">
      <span class="mode-icon">${m.icon}</span>${m.label}
    </button>`
  ).join('') + `<span class="preview-size-label">${previewMode==='mobile'?'375px':'자동'}</span>`;
}

function renderEditor() {
  const el = document.getElementById('tab-content');
  if (currentTab === 'blocks') {
    el.innerHTML = blocks.map((b,i) => renderBlockCard(b,i)).join('')
      || '<p style="text-align:center;color:#555;padding:40px 0">블록을 추가하세요</p>';
  } else {
    el.innerHTML = renderStylePanel();
  }
}

function renderBlockCard(b, i) {
  const isFirst=i===0, isLast=i===blocks.length-1;
  let inner = '';
  if (b.type==='text') {
    inner = `<textarea class="block-textarea" rows="4" placeholder="텍스트를 입력하세요..."
      oninput="updateBlock(${i},'content',this.value)">${esc(b.content)}</textarea>`;
  } else {
    if (b.src) {
      inner = `<div class="img-preview"><img src="${esc(b.src)}" />
        <div class="img-overlay">
          <button onclick="triggerFileInput(${i})">변경</button>
          <button onclick="clearImage(${i})">제거</button>
        </div></div>`;
    } else {
      inner = `<div class="upload-zone" onclick="triggerFileInput(${i})"
        ondragover="event.preventDefault();this.style.borderColor='#888'"
        ondragleave="this.style.borderColor='#444'"
        ondrop="handleDrop(event,${i});this.style.borderColor='#444'">
        <span style="font-size:22px">+</span> 이미지 업로드
        <span class="hint">드래그, 클릭, 또는 Ctrl+V</span></div>`;
    }
    inner += `<input type="file" accept="image/*" id="file-${b.id}" style="display:none" onchange="handleFile(${i},this)" />`;
    inner += `<input class="img-url-input" type="text" placeholder="또는 이미지 URL 직접 입력"
      value="${esc(b.url||'')}" oninput="updateBlock(${i},'url',this.value)" />`;
  }
  return `<div class="block-card"><div class="block-header">
    <span class="block-type ${b.type}">${b.type==='text'?'텍스트':'이미지'}</span>
    <div class="block-actions">
      ${!isFirst?`<button class="icon-btn" onclick="moveBlock(${i},-1)">▲</button>`:''}
      ${!isLast?`<button class="icon-btn" onclick="moveBlock(${i},1)">▼</button>`:''}
      <button class="icon-btn danger" onclick="deleteBlock(${i})">✕</button>
    </div></div>${inner}</div>`;
}

function renderStylePanel() {
  const bgP=['#2b2b2b','#1a1a2e','#1e1e1e','#2d2520','#0d1117','#f5f0e8'];
  const txP=['#e8e0d4','#ffffff','#d4d4d4','#c9b99a','#a0c4ff','#333333'];
  const als=[{v:'left',l:'왼쪽'},{v:'center',l:'가운데'},{v:'justify',l:'양쪽'}];
  const s=settings;
  const quoteTypes=[{v:'all',l:'전부'},{v:'double',l:'" "'},{v:'single',l:"' '"},{v:'guillemet',l:'« »'}];
  const demoText='"사춘기잖아." 그녀가 말했다. "방패막이 유지비라고 생각해."';
  let demoHTML = s.dialogueEnabled ? styleLine(demoText) : `<span style="color:${s.textColor}">${esc(demoText)}</span>`;

  return `
    <div class="section-title">기본 스타일</div>
    ${colorGroup('배경색','bgColor',s.bgColor,bgP)}
    <div class="style-group"><span class="style-label">글꼴 (아카라이브 지원)</span>
      <select class="style-select" onchange="setSetting('fontFamily',this.value)">
        ${ARCA_FONTS.map(f=>`<option value="${esc(f.v)}" ${s.fontFamily===f.v?'selected':''}>${f.l}</option>`).join('')}
      </select></div>
    ${sliderGroup('글자 크기','fontSize',s.fontSize,13,28,1,'px')}
    ${sliderGroup('줄 간격','lineHeight',s.lineHeight,1.2,2.4,0.05,'')}
    <div class="style-group"><span class="style-label">정렬</span>
      <div class="align-btns">
        ${als.map(a=>`<button class="align-btn ${s.textAlign===a.v?'active':''}"
          onclick="setSetting('textAlign','${a.v}')">${a.l}</button>`).join('')}
      </div></div>
    ${sliderGroup('이미지 둥글기','imageRadius',s.imageRadius,0,40,1,'px')}
    ${sliderGroup('이미지 너비','imageWidth',s.imageWidth,30,100,1,'%')}
    <div class="style-group"><div class="toggle-row">
      <span class="style-label" style="margin:0">이미지 절반 자르기</span>
      <button class="toggle ${s.imageCrop?'on':'off'}" onclick="setSetting('imageCrop',!settings.imageCrop)"></button>
    </div></div>
    ${s.imageCrop ? sliderGroup('자르기 높이','imageCropHeight',s.imageCropHeight,100,600,10,'px') : ''}
    ${sliderGroup('상하 여백','padding',s.padding,16,80,1,'px')}

    <hr class="section-divider">
    <div class="section-title">시작 / 끝 장식</div>
    <div class="style-group"><div class="toggle-row">
      <span class="style-label" style="margin:0">시작·끝 표시</span>
      <button class="toggle ${s.markerEnabled?'on':'off'}" onclick="setSetting('markerEnabled',!settings.markerEnabled)"></button>
    </div></div>
    ${s.markerEnabled ? renderMarkerStyleBtns(s) : ''}

    <hr class="section-divider">
    <div class="section-title">대사 / 서술 스타일</div>
    <div class="style-group"><div class="toggle-row">
      <span class="style-label" style="margin:0">대사 자동 스타일</span>
      <button class="toggle ${s.dialogueEnabled?'on':'off'}" onclick="setSetting('dialogueEnabled',!settings.dialogueEnabled)"></button>
    </div></div>

    ${s.dialogueEnabled ? `
    <div class="style-group"><span class="style-label">인식할 따옴표</span>
      <div class="align-btns">
        ${quoteTypes.map(q=>`<button class="align-btn ${s.dialogueQuoteStyle===q.v?'active':''}"
          onclick="setSetting('dialogueQuoteStyle','${q.v}')">${q.l}</button>`).join('')}
      </div></div>
    ${colorGroup('대사 색상','dialogueColor',s.dialogueColor,['#c9b99a','#ffb86b','#8bc7ff','#a8e6a3','#ff9e9e','#d4b8ff'])}
    <div class="style-group"><span class="style-label">대사 효과</span>
      <div class="align-btns">
        <button class="align-btn ${s.dialogueBold?'active':''}" onclick="setSetting('dialogueBold',!settings.dialogueBold)"><b>굵게</b></button>
        <button class="align-btn ${s.dialogueItalic?'active':''}" onclick="setSetting('dialogueItalic',!settings.dialogueItalic)"><i>기울임</i></button>
      </div></div>
    ${colorGroup('서술 색상','narrationColor',s.narrationColor,['#e8e0d4','#999999','#b0b0b0','#d4d4d4','#8a8a8a','#666666'])}
    <div class="style-group"><span class="style-label">미리보기</span>
      <div class="demo-box" style="background:${s.bgColor};font-family:${s.fontFamily};font-size:14px;color:${s.textColor};line-height:1.7">${demoHTML}</div>
    </div>
    ` : `${colorGroup('글자색','textColor',s.textColor,txP)}`}
  `;
}

function colorGroup(label,key,value,presets) {
  return `<div class="style-group"><span class="style-label">${label}</span>
    <div class="color-row">
      <input type="color" class="color-input" value="${value}" onchange="setSetting('${key}',this.value)" />
      <div class="color-presets">
        ${presets.map(c=>`<button class="color-preset ${value===c?'active':''}"
          style="background:${c}" onclick="setSetting('${key}','${c}')"></button>`).join('')}
      </div>
    </div></div>`;
}
function sliderGroup(label,key,value,min,max,step,unit) {
  const d=(step<1)?Number(value).toFixed(2):value;
  return `<div class="style-group"><span class="style-label">${label}</span>
    <div class="slider-row">
      <input type="range" min="${min}" max="${max}" step="${step}" value="${value}"
        oninput="setSetting('${key}',Number(this.value))" />
      <span class="slider-val">${d}${unit}</span>
    </div></div>`;
}

function renderBottom() {
  const el = document.getElementById('bottom-bar');
  let html = '';
  if (currentTab==='blocks') {
    html += `<div class="btn-row">
      <button class="add-btn" onclick="addBlock('text')">+ 텍스트</button>
      <button class="add-btn" onclick="addBlock('image')">+ 이미지</button>
    </div>`;
  }
  html += `<div class="btn-row">
    <button class="primary-btn copy-rich" id="btn-rich" onclick="copyRich()">📋 서식째로 복사 (Ctrl+V용)</button>
  </div>`;
  html += `<div class="btn-row">
    <button class="primary-btn copy-html" id="btn-html" onclick="copyRawHTML()">HTML 코드 복사</button>
    <button class="add-btn" style="flex:none;width:70px" onclick="toggleCode()">${showCode?'닫기':'코드'}</button>
  </div>`;
  html += `<div class="btn-row" style="margin-top:4px">
    <button class="add-btn" style="color:#666;font-size:11px;padding:6px 0;border-color:#333" onclick="resetAll()">초기화</button>
  </div>`;
  el.innerHTML = html;
}

// ── Preview rendering ──
function buildPreviewHTML() {
  const s = settings;
  let html = `<div style="background:${s.bgColor};padding:${s.padding}px 24px;min-height:200px">
    <div style="max-width:520px;margin:0 auto">`;

  if (!blocks.length) {
    html += `<p style="text-align:center;color:${s.textColor};opacity:.3;padding:80px 0;font-size:18px">블록을 추가하세요</p>`;
  }
  if (blocks.length && s.markerEnabled) html += buildMarkerHTML(s);
  blocks.forEach(b => {
    if (b.type==='text') {
      html += `<div style="padding:0 8px;margin-bottom:24px">`;
      b.content.split('\n').forEach(line => {
        if (line.trim()==='') html += `<div style="height:${Math.round(s.fontSize*0.8)}px"></div>`;
        else if (/^-{2,}$/.test(line.trim())) html += `<hr style="border:none;border-top:1px solid ${s.textColor};opacity:.25;margin:1em 0" />`;
        else html += `<p style="margin:0 0 .5em;color:${s.textColor};font-family:${s.fontFamily};font-size:${s.fontSize}px;line-height:${s.lineHeight};letter-spacing:.02em;text-align:${s.textAlign};word-break:keep-all;overflow-wrap:break-word">${styleLine(line)}</p>`;
      });
      html += `</div>`;
    }
    if (b.type==='image') {
      const src=b.src||b.url;
      if (src) {
        if (s.imageCrop) {
          html += `<div style="display:flex;justify-content:center;padding:12px 0;margin-bottom:24px"><img src="${esc(src)}" style="max-width:${s.imageWidth}%;height:${s.imageCropHeight}px;object-fit:cover;border-radius:${s.imageRadius}px;box-shadow:0 4px 20px rgba(0,0,0,.35);display:block" /></div>`;
        } else {
          html += `<div style="display:flex;justify-content:center;padding:12px 0;margin-bottom:24px"><img src="${esc(src)}" style="max-width:${s.imageWidth}%;border-radius:${s.imageRadius}px;box-shadow:0 4px 20px rgba(0,0,0,.35)" /></div>`;
        }
      }
      else html += `<div class="img-placeholder">🖼</div>`;
    }
  });
  if (blocks.length && s.markerEnabled) html += buildMarkerHTML(s);
  html += `</div></div>`;
  return html;
}

function renderPreview() {
  const container = document.getElementById('preview-scroll');
  const content = buildPreviewHTML();

  if (previewMode === 'mobile') {
    container.innerHTML = `
      <div class="preview-frame-mobile">
        <div class="phone-mockup">
          <div class="phone-notch"></div>
          <div class="phone-screen">${content}</div>
          <div class="phone-home-bar"></div>
        </div>
      </div>`;
  } else {
    container.innerHTML = `
      <div class="preview-frame-desktop">
        <div class="preview-box">${content}</div>
      </div>`;
  }
}

// ── Actions ──
function updateBlock(i,key,val){
  blocks[i][key]=val;
  renderPreview();
  renderBottom();
  if (showCode) {
    document.getElementById('code-panel').style.display = 'flex';
    document.getElementById('code-area').value = generateHTML();
  }
  saveState();
}
function deleteBlock(i){blocks.splice(i,1);render();}
function moveBlock(i,dir){const t=i+dir;if(t<0||t>=blocks.length)return;[blocks[i],blocks[t]]=[blocks[t],blocks[i]];render();}
function addBlock(type){blocks.push(type==='text'?{id:uid(),type:'text',content:''}:{id:uid(),type:'image',src:'',url:''});render();setTimeout(()=>{document.getElementById('tab-content').scrollTop=99999},50);}
function setSetting(key,val){settings[key]=val;render();}
function clearImage(i){blocks[i].src='';render();}
function triggerFileInput(i){document.getElementById('file-'+blocks[i].id)?.click();}
function handleFile(i,input){const file=input.files?.[0];if(!file)return;readImageFile(file,d=>{blocks[i].src=d;render();});}
function handleDrop(e,i){e.preventDefault();const file=e.dataTransfer?.files?.[0];if(file&&file.type.startsWith('image/'))readImageFile(file,d=>{blocks[i].src=d;render();});}
function readImageFile(file,cb){const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(file);}
function toggleCode(){showCode=!showCode;render();}

function resetAll(){
  if(!confirm('모든 블록과 설정을 초기화합니다. 계속할까요?')) return;
  blocks = [
    { id:uid(), type:'text', content:'' },
  ];
  settings = {
    bgColor:'#2b2b2b', textColor:'#e8e0d4',
    fontSize:18, fontFamily:"'NanumBarunGothic', sans-serif",
    lineHeight:1.85, imageRadius:14, imageWidth:65,
    textAlign:'left', padding:48,
    dialogueEnabled: true,
    dialogueColor: '#c9b99a',
    dialogueBold: false,
    dialogueItalic: false,
    dialogueQuoteStyle: 'all',
    narrationColor: '#e8e0d4',
    imageCrop: false,
    imageCropHeight: 300,
    markerEnabled: false,
    markerStyle: 'long-line',
  };
  showCode = false;
  previewMode = 'desktop';
  localStorage.removeItem('arca-vn-v5');
  render();
}

function dimColor(hex, alpha) {
  const bg = settings.bgColor || '#2b2b2b';
  const parse = c => { c=c.replace('#',''); if(c.length===3)c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2]; return [parseInt(c.slice(0,2),16),parseInt(c.slice(2,4),16),parseInt(c.slice(4,6),16)]; };
  const [fr,fg,fb] = parse(hex), [br,bg2,bb] = parse(bg);
  const blend = (f,b) => Math.round(f*alpha + b*(1-alpha));
  return '#'+[blend(fr,br),blend(fg,bg2),blend(fb,bb)].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function buildMarkerHTML(s) {
  const styles = {
    'long-line': {text:'', useLine:true},
    'line-diamond': {text:'✦', useLine:true},
    'line-flower': {text:'✿', useLine:true},
    'line-star': {text:'✶', useLine:true},
    'dots': {text:'· · · · ·', useLine:false},
    'flourish': {text:'❧', useLine:false},
  };
  const st = styles[s.markerStyle] || styles['long-line'];
  const dim25 = dimColor(s.textColor, 0.25);
  const dim30 = dimColor(s.textColor, 0.3);
  if (st.useLine && st.text) {
    return `<table style="width:80%;margin:0 auto;padding:10px 0;margin-bottom:16px;border-collapse:collapse"><tr><td style="border-bottom:1px solid ${dim25};width:45%"></td><td style="text-align:center;color:${dim25};font-size:13px;padding:0 12px">${st.text}</td><td style="border-bottom:1px solid ${dim25};width:45%"></td></tr></table>`;
  }
  if (st.useLine) {
    return `<div style="text-align:center;padding:10px 0;margin-bottom:16px;max-width:80%;margin-left:auto;margin-right:auto"><hr style="border:none;border-top:1px solid ${dim25};margin:0" /></div>`;
  }
  return `<div style="text-align:center;color:${dim30};padding:10px 0;margin-bottom:16px;font-size:14px;letter-spacing:.3em">${st.text}</div>`;
}

function renderMarkerStyleBtns(s) {
  const opts = [
    {v:'long-line',l:'────'},
    {v:'line-diamond',l:'─ ✦ ─'},
    {v:'line-flower',l:'─ ✿ ─'},
    {v:'line-star',l:'─ ✶ ─'},
    {v:'dots',l:'· · · · ·'},
    {v:'flourish',l:'❧'},
  ];
  const btns = opts.map(m =>
    '<button class="align-btn ' + (s.markerStyle===m.v?'active':'') + '" onclick="setSetting(\'markerStyle\',\'' + m.v + '\')" style="font-size:11px">' + m.l + '</button>'
  ).join('');
  return '<div class="style-group"><span class="style-label">장식 스타일</span><div class="align-btns">' + btns + '</div></div>';
}

// ── Generate HTML ──
function generateHTML() {
  const s=settings;
  let h=`<div style="background:${s.bgColor};padding:${s.padding}px 24px;border-radius:8px">\n<div style="max-width:520px;margin:0 auto">\n`;
  if (blocks.length && s.markerEnabled) h += buildMarkerHTML(s) + '\n';
  blocks.forEach(b=>{
    if(b.type==='text'){
      h+=`<div style="padding:0 8px;margin-bottom:24px">\n`;
      b.content.split('\n').forEach(line=>{
        if(line.trim()==='') h+=`<div style="height:${Math.round(s.fontSize*0.8)}px"></div>\n`;
        else if(/^-{2,}$/.test(line.trim())) h+=`<hr style="border:none;border-top:1px solid ${dimColor(s.textColor,0.25)};margin:1em 0" />\n`;
        else h+=`<p style="margin:0 0 0.5em;color:${s.textColor};font-family:${s.fontFamily};font-size:${s.fontSize}px;line-height:${s.lineHeight};letter-spacing:0.02em;text-align:${s.textAlign};word-break:keep-all">${styleLine(line)}</p>\n`;
      });
      h+=`</div>\n`;
    }
    if(b.type==='image'){
      const src=b.url||(b.src&&!b.src.startsWith('data:')?b.src:'');
      if(src){
        if(s.imageCrop){
          h+=`<div style="text-align:center;padding:12px 0;margin-bottom:24px">\n<img src="${esc(src)}" style="max-width:${s.imageWidth}%;height:${s.imageCropHeight}px;border-radius:${s.imageRadius}px;box-shadow:0 4px 20px rgba(0,0,0,0.35);display:block;margin:0 auto" />\n</div>\n`;
        } else {
          h+=`<div style="text-align:center;padding:12px 0;margin-bottom:24px">\n<img src="${esc(src)}" style="max-width:${s.imageWidth}%;border-radius:${s.imageRadius}px;box-shadow:0 4px 20px rgba(0,0,0,0.35)" />\n</div>\n`;
        }
      }
    }
  });
  if (blocks.length && s.markerEnabled) h += buildMarkerHTML(s) + '\n';
  h+=`</div>\n</div>`;
  return h;
}

// ── Copy ──
async function copyRich() {
  const s=settings;
  let h=`<div style="background:${s.bgColor};padding:${s.padding}px 24px"><div style="max-width:520px;margin:0 auto">`;
  if (blocks.length && s.markerEnabled) h += buildMarkerHTML(s);
  blocks.forEach(b=>{
    if(b.type==='text'){
      h+=`<div style="padding:0 8px;margin-bottom:24px">`;
      b.content.split('\n').forEach(line=>{
        if(line.trim()==='')h+=`<br>`;
        else if(/^-{2,}$/.test(line.trim())) h+=`<hr style="border:none;border-top:1px solid ${dimColor(s.textColor,0.25)};margin:1em 0" />`;
        else h+=`<p style="margin:0 0 0.5em;color:${s.textColor};font-family:${s.fontFamily};font-size:${s.fontSize}px;line-height:${s.lineHeight};letter-spacing:0.02em;text-align:${s.textAlign};word-break:keep-all">${styleLine(line)}</p>`;
      });
      h+=`</div>`;
    }
    if(b.type==='image'){const src=b.url||b.src;if(src){
      if(s.imageCrop){
        h+=`<div style="text-align:center;padding:12px 0;margin-bottom:24px"><img src="${src}" style="max-width:${s.imageWidth}%;height:${s.imageCropHeight}px;border-radius:${s.imageRadius}px;display:block;margin:0 auto"></div>`;
      } else {
        h+=`<div style="text-align:center;padding:12px 0;margin-bottom:24px"><img src="${src}" style="max-width:${s.imageWidth}%;border-radius:${s.imageRadius}px"></div>`;
      }
    }}
  });
  if (blocks.length && s.markerEnabled) h += buildMarkerHTML(s);
  h+=`</div></div>`;
  try{await navigator.clipboard.write([new ClipboardItem({'text/html':new Blob([h],{type:'text/html'}),'text/plain':new Blob([h],{type:'text/plain'})})]);flashBtn('btn-rich','✓ 복사됨! 아카라이브에 Ctrl+V');}
  catch(e){try{await navigator.clipboard.writeText(h);toast('텍스트로 복사됨');}catch(e2){toast('복사 실패');}}
}
async function copyRawHTML(){try{await navigator.clipboard.writeText(generateHTML());flashBtn('btn-html','✓ 코드 복사됨!');}catch(e){toast('복사 실패');}}

function flashBtn(id,msg){const btn=document.getElementById(id);if(!btn)return;const orig=btn.textContent;btn.classList.add('ok');btn.textContent=msg;setTimeout(()=>{btn.classList.remove('ok');btn.textContent=orig;},2500);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

render();
</script>
